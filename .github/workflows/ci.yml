name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE_24: "true"

jobs:
  workspace-hygiene:
    name: Workspace hygiene (cargo metadata)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cargo metadata
        run: cargo metadata --all-features --format-version 1

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    needs: workspace-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Rustfmt check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: workspace-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test --workspace --all-features

  governance-lint:
    name: Governance lint (workspace + workflows)
    runs-on: ubuntu-latest
    needs: workspace-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Workspace lint
        run: cargo run -p ble-tools-workspace-lint -- --fail-on-error

      - name: CI workflow lint
        run: cargo run -p ble-tools-ci-lint-github -- --fail-on-error
