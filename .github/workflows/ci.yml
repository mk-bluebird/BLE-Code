# File: .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE_24: "true"
  CARGO_INCREMENTAL: "0"

jobs:
  workspace-hygiene:
    name: Workspace hygiene (cargo metadata)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cargo metadata
        run: cargo metadata --all-features --format-version 1

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    needs: workspace-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"
          components: rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: workspace-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  code-patterns:
    name: Code pattern check
    runs-on: ubuntu-latest
    needs: workspace-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run code pattern checker
        run: |
          BLE_CODE_PATTERNS_CONFIG=tools/code_patterns.toml \
          cargo run -p ble-tools-code-patterns --quiet

  ble-guard-demo:
    name: ble-guard-demo dry-run
    runs-on: ubuntu-latest
    needs: workspace-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run ble-guard-demo in dry-run mode
        run: cargo run --example ble-guard-demo -- --dry-run

  test:
    name: Test
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - code-patterns
      - ble-guard-demo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-features

  governance-lint:
    name: Governance lint (workspace + workflows)
    runs-on: ubuntu-latest
    needs: workspace-hygiene

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.85.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Workspace lint
        run: cargo run -p ble-tools-workspace-lint -- --fail-on-error

      - name: CI workflow lint
        run: cargo run -p ble-tools-ci-lint-github -- --fail-on-error
