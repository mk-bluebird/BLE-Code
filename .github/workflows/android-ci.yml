name: Android CI

on:
  push:
    branches: ["main"]
    paths:
      - "docs/android/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "docs/android/**"
      - ".github/workflows/android-ci.yml"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE_24: "true"
  ORG_GRADLE_PROJECT_org.gradle.jvmargs: "-Xmx3g -Dfile.encoding=UTF-8"

jobs:
  android-build:
    name: Android build (docs/android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android samples
        working-directory: docs/android
        run: ./gradlew assembleDebug --stacktrace

  android-test:
    name: Android unit tests
    runs-on: ubuntu-latest
    needs: android-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        working-directory: docs/android
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: docs/android/**/build/reports/tests/testDebugUnitTest
