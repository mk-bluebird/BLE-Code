# File: .cargo/config.toml

[net]
retry = 2
git-fetch-with-cli = true
offline = false

[build]
# Ensure consistent target and host triples
target-dir = "target"
jobs = 0                # Let CI pick CPU cores; can pin to reduce jitter
incremental = false     # More reproducible builds, less disk use
rustflags = [
    "-Cdebuginfo=1",
    "-Coverflow-checks=on",
]

[term]
color = "always"
