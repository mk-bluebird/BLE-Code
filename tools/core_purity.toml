# tools/core_purity.toml
#
# Core purity config for ble-tools-core-purity.
# This file mirrors the semantics of tools/check_core_purity.sh:
#   - Same core crate list.
#   - Same forbidden dependency names: btleplug, android, jni, tokio.
# Source-level checks are currently disabled; you can tighten them later.

core_crates = [
  "crates/ble-model",
  "crates/ble-governance",
  "crates/ble-guard",
  "crates/ble-env-ingest",
]

forbidden_deps = [
  "btleplug",
  "android",
  "jni",
  "tokio",
]

# Source-level checks are off for now, to exactly mirror the bash script.
platform_patterns = []
forbidden_actuation_patterns = []
